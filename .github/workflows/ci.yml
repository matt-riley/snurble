name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    uses: matt-riley/matt-riley-ci/.github/workflows/node-ci.yml@ffc0652da3f2073f8c91c458ce415068145400c7 # v1
    with:
      node-version: "24"
      package-manager: pnpm
      pnpm-version: "10.33.0"
      require-lockfile: true
      verify-lockfile-clean: true
      run-build: true
      concurrency-suffix: validate

  typecheck:
    uses: matt-riley/matt-riley-ci/.github/workflows/node-ci.yml@ffc0652da3f2073f8c91c458ce415068145400c7 # v1
    with:
      node-version: "24"
      package-manager: pnpm
      pnpm-version: "10.33.0"
      require-lockfile: true
      verify-lockfile-clean: true
      run-lint: false
      run-build: false
      test-script: typecheck
      concurrency-suffix: typecheck

  deploy:
    needs:
      - validate
      - typecheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/request-infra-deploy.yml
    with:
      app-name: snurble
    secrets:
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
