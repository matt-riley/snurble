name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    uses: matt-riley/matt-riley-ci/.github/workflows/node-ci.yml@7bf33bf0eef269c4a4b1d85e1668dec14fb8ffff # v1
    with:
      node-version: "24"
      package-manager: pnpm
      pnpm-version: "10.33.0"
      require-lockfile: true
      verify-lockfile-clean: true
      run-build: true
      concurrency-suffix: validate

  typecheck:
    uses: matt-riley/matt-riley-ci/.github/workflows/node-ci.yml@7bf33bf0eef269c4a4b1d85e1668dec14fb8ffff # v1
    with:
      node-version: "24"
      package-manager: pnpm
      pnpm-version: "10.33.0"
      require-lockfile: true
      verify-lockfile-clean: true
      run-lint: false
      run-build: false
      test-script: typecheck
      concurrency-suffix: typecheck
