name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    uses: matt-riley/matt-riley-ci/.github/workflows/node-ci.yml@7bf33bf0eef269c4a4b1d85e1668dec14fb8ffff # v1
    with:
      node-version: "24"
      package-manager: pnpm
      pnpm-version: "10.33.0"
      require-lockfile: true
      verify-lockfile-clean: true
      run-build: true
      build-env: NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

  typecheck:
    uses: matt-riley/matt-riley-ci/.github/workflows/node-ci.yml@7bf33bf0eef269c4a4b1d85e1668dec14fb8ffff # v1
    with:
      node-version: "24"
      package-manager: pnpm
      pnpm-version: "10.33.0"
      require-lockfile: true
      verify-lockfile-clean: true
      run-lint: false
      run-build: false
      test-script: typecheck
      build-env: NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs:
      - validate
      - typecheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/request-infra-deploy.yml
    with:
      app-name: snurble
    secrets:
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
