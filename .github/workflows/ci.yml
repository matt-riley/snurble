name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  validate:
    uses: matt-riley/matt-riley-ci/.github/workflows/node-ci.yml@88b73ab838aa7ba439a7ec594717bba43014e5d4 # v1
    with:
      concurrency-suffix: validate
      node-version: "24"
      package-manager: pnpm
      pnpm-version: "10.33.0"
      require-lockfile: true
      verify-lockfile-clean: true
      run-build: true
    secrets:
      node_auth_token: ${{ secrets.GITHUB_TOKEN }}

  typecheck:
    uses: matt-riley/matt-riley-ci/.github/workflows/node-ci.yml@88b73ab838aa7ba439a7ec594717bba43014e5d4 # v1
    with:
      concurrency-suffix: typecheck
      node-version: "24"
      package-manager: pnpm
      pnpm-version: "10.33.0"
      require-lockfile: true
      verify-lockfile-clean: true
      run-lint: false
      run-build: false
      test-script: typecheck
    secrets:
      node_auth_token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs:
      - validate
      - typecheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/request-infra-deploy.yml
    with:
      app-name: snurble
    secrets:
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
