name: Publish Release Tags

on:
  workflow_dispatch:
    inputs:
      tokens_tag:
        description: Release tag to publish for @matt-riley/design-tokens
        required: false
        type: string
      ui_astro_tag:
        description: Release tag to publish for @matt-riley/ui-astro
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-design-tokens:
    name: Publish design tokens
    if: ${{ inputs.tokens_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tokens_tag }}

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          registry-url: https://npm.pkg.github.com
          scope: "@matt-riley"

      - name: Verify tag matches package version
        env:
          EMITTED_TAG: ${{ inputs.tokens_tag }}
        run: |
          package_version="$(jq -r '.version' packages/tokens/package.json)"
          if [[ "$EMITTED_TAG" != *"$package_version" ]]; then
            echo "::error::Release tag $EMITTED_TAG does not end with package version $package_version."
            exit 1
          fi

      - name: Publish package
        working-directory: packages/tokens
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

  publish-ui-astro:
    name: Publish ui-astro
    needs:
      - publish-design-tokens
    if: ${{ inputs.ui_astro_tag != '' && (inputs.tokens_tag == '' || needs.publish-design-tokens.result == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ui_astro_tag }}

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          registry-url: https://npm.pkg.github.com
          scope: "@matt-riley"

      - name: Verify tag matches package version
        env:
          EMITTED_TAG: ${{ inputs.ui_astro_tag }}
        run: |
          package_version="$(jq -r '.version' packages/ui-astro/package.json)"
          if [[ "$EMITTED_TAG" != *"$package_version" ]]; then
            echo "::error::Release tag $EMITTED_TAG does not end with package version $package_version."
            exit 1
          fi

      - name: Publish package
        working-directory: packages/ui-astro
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
